# One-shot migration Job — same image as the backend Deployment, command
# overridden to run Prisma migrations instead of starting the server.
# Apply manually after postgres is up: kubectl apply -f k8s/migrate-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: backend-migrate
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: url-shortener-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
