# dev-only credentials, replace via sealed-secrets/external-secrets in real environments
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener
type: Opaque
stringData:
  DATABASE_URL: postgresql://shortener:shortener@postgres:5432/shortener
  POSTGRES_USER: shortener
  POSTGRES_PASSWORD: shortener
  POSTGRES_DB: shortener
