apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener
data:
  PORT: "3000"
  NODE_ENV: "production"
  REDIS_URL: "redis://redis:6379"
  CORS_ORIGIN: "http://app.url-shortener.local"
  DEFAULT_CACHE_TTL_SECONDS: "3600"
  SHORT_CODE_LENGTH: "6"
