# Template for k8s/secret.yaml — copy this file to secret.yaml and fill in
# real values for your environment. secret.yaml is gitignored and must never
# be committed with real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener
type: Opaque
stringData:
  DATABASE_URL: postgresql://CHANGE_ME:CHANGE_ME@postgres:5432/CHANGE_ME
  POSTGRES_USER: CHANGE_ME
  POSTGRES_PASSWORD: CHANGE_ME
  POSTGRES_DB: CHANGE_ME
